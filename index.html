<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>video</title>

<style>
body{
    margin:0;
    background:black;
    overflow:hidden;
}

video{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    object-fit:cover;
}
</style>
</head>

<body>

<video id="video" autoplay loop playsinline muted>
    <source src="2026-06-23-010114573.mp4" type="video/mp4">
</video>

<script>
const video = document.getElementById("video");

/* tente de forcer la lecture */
window.addEventListener("load", async () => {
    try {
        await video.play();
    } catch (e) {
        console.log("autoplay bloqué par le navigateur");
    }
});
</script>

</body>
</html>
